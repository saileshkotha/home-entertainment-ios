name: HomeEntertainment
options:
  bundleIdPrefix: com.kotha
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  HomeEntertainment:
    type: application
    platform: iOS
    sources:
      - path: HomeEntertainment
        excludes:
          - Resources
      - path: HomeEntertainment/Resources
        buildPhase: resources
    info:
      path: HomeEntertainment/Info.plist
    settings:
      base:
        INFOPLIST_FILE: HomeEntertainment/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kotha.home-entertainment
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  HomeEntertainmentTV:
    type: application
    platform: tvOS
    sources:
      - path: HomeEntertainmentTV
        excludes:
          - Info.plist
      - path: HomeEntertainment/Models
      - path: HomeEntertainment/Services
      - path: HomeEntertainment/Utilities
        excludes:
          - Theme.swift
      - path: HomeEntertainment/ViewModels/DownloadsViewModel.swift
      - path: HomeEntertainment/Resources
        buildPhase: resources
    info:
      path: HomeEntertainmentTV/Info.plist
    settings:
      base:
        INFOPLIST_FILE: HomeEntertainmentTV/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kotha.home-entertainment-tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
